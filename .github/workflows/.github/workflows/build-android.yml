name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          unityVersion: 2021.3.40f1
          targetPlatform: Android
          skipActivation: true

      - uses: actions/upload-artifact@v4
        with:
          name: DefendTheBits-Android
          path: build/Android/
